{
  "device": "/dev/input/event0",
  "configuration": {
    "KEY_ENTER": {
      "action": [
        {
          "step_num": 0,
          "prompt": "checknet_prompt",
          "enter": "play /usr/share/sounds/other/wifireset.opus",
          "key1": "checknet",
          "timeout": 10
        },
        {
          "step_num": 1,
          "prompt": "play /usr/share/sounds/other/taskprompt.opus",
          "enter": "play /usr/share/sounds/other/systemreset.opus",
          "key1": "/sbin/wlan reset;reboot",
          "timeout": 10
        },
        {
          "step_num": 2,
          "prompt": "play /usr/share/sounds/other/taskprompt.opus",
          "enter": "",
          "key1": "firstboot -f",
          "timeout": 10
        }
      ]
    },
    "KEY_1": {
      "action": "play /usr/share/sounds/other/call.opus",
      "timeout": 5
    }
  }
}
